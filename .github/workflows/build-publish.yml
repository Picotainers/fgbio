name: Build and Publish fgbio

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: picotainers-local/fgbio:smoke

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run --rm picotainers-local/fgbio:smoke --help > help.txt
          grep -Eiq 'fgbio|usage|version|command|subcommand|java' help.txt

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/picotainers/fgbio:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
